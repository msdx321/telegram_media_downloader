name: Docker Publish

# Multi-arch image built on native runners (amd64 on ubuntu-latest, arm64 on
# ubuntu-24.04-arm) and merged into a single manifest. Avoids QEMU, which is
# impractically slow for a release Rust build with LTO.
#
# Pattern: each platform builds and pushes by digest; a merge job assembles the
# tagged manifest list from the digests.
on:
  push:
    tags: ['v*']

permissions:
  contents: read

env:
  REGISTRY_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/tmd-rs

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: amd64
            runner: ubuntu-latest
          - platform: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare platform name
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/${{ matrix.platform }}
          outputs: type=image,"name=${{ env.REGISTRY_IMAGE }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.REGISTRY_IMAGE }}:buildcache-${{ env.PLATFORM_PAIR }}
          cache-to: type=registry,ref=${{ env.REGISTRY_IMAGE }}:buildcache-${{ env.PLATFORM_PAIR }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Package amd64 release binary
        if: matrix.platform == 'amd64'
        run: |
          image="${{ env.REGISTRY_IMAGE }}@${{ steps.build.outputs.digest }}"
          docker pull "$image"
          container="$(docker create "$image")"
          mkdir -p dist
          docker cp "$container:/usr/local/bin/tmd" dist/tmd
          docker rm "$container"
          cp README.md LICENSE dist/
          (cd dist && zip -r "../tmd-${{ github.ref_name }}-linux-amd64.zip" .)

      - name: Upload release binary
        if: matrix.platform == 'amd64'
        uses: actions/upload-artifact@v4
        with:
          name: tmd-linux-amd64
          path: tmd-${{ github.ref_name }}-linux-amd64.zip
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: merge
    permissions:
      contents: write
    steps:
      - name: Download release binary
        uses: actions/download-artifact@v4
        with:
          name: tmd-linux-amd64
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tmd-${{ github.ref_name }}-linux-amd64.zip
          generate_release_notes: true
