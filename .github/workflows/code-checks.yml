name: Code Quality

on:
  pull_request:
    branches: [master]
    paths-ignore:
      - "README.md"
  push:
    branches: [master]
    paths-ignore:
      - "README.md"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          uv sync
          uv run python gen_filter_cache.py

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy type check (advisory)
        run: uv run mypy media_downloader.py utils module --ignore-missing-imports
        continue-on-error: true  # pre-existing type errors, fix incrementally
