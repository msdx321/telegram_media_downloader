name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build release binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/tmd README.md LICENSE dist/
          (cd dist && zip -r "../tmd-${{ github.ref_name }}-linux-amd64.zip" .)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tmd-linux-amd64
          path: tmd-${{ github.ref_name }}-linux-amd64.zip

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built binary
        uses: actions/download-artifact@v4
        with:
          name: tmd-linux-amd64
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tmd-${{ github.ref_name }}-linux-amd64.zip
          generate_release_notes: true
