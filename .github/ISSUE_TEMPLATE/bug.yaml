name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Which release, tag, or commit are you running?
      placeholder: ex. v0.1.1 or 550a063a7fad8723220d8681687d2363cb838d7c
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      multiple: true
      options:
        - macOS
        - Windows
        - Linux
        - Docker
        - Other
    validations:
      required: false
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the failure and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Paste the relevant parts of config.yaml. Remove API keys, tokens, phone numbers, and private chat identifiers.
      render: yaml
    validations:
      required: false
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: List the commands and actions that reproduce the problem.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      render: shell
