name: Feature Request
description: Suggest an improvement for Telegram Media Downloader
title: "[Feature]: "
labels: ["feature_request"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List any workarounds or alternate designs you considered.
    validations:
      required: false
