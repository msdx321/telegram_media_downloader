<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Telegram Media Downloader</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<style>
  :root { --pico-font-size: 87.5%; }
  body { min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: .75rem var(--pico-block-spacing-horizontal); border-bottom: 1px solid var(--pico-muted-border-color); }
  header nav { display: flex; justify-content: space-between; align-items: center; }
  header strong { font-size: 1.05rem; }
  .ver { font-size: .75rem; opacity: .55; margin-left: .5rem; }
  main { flex: 1; padding: 1rem 0; }
  footer { padding: .5rem var(--pico-block-spacing-horizontal); border-top: 1px solid var(--pico-muted-border-color); font-size: .8rem; opacity: .65; }
  footer div { display: flex; justify-content: space-between; }
  .speed { color: var(--pico-primary); font-weight: 600; }

  /* Pause / resume button variants */
  button { text-transform: capitalize; }
  button.btn-pause { --pico-background-color: #dc2626; --pico-border-color: #dc2626; --pico-color: #fff; }
  button.btn-pause:hover { --pico-background-color: #b91c1c; --pico-border-color: #b91c1c; }
  button.btn-resume { --pico-background-color: #16a34a; --pico-border-color: #16a34a; --pico-color: #fff; }
  button.btn-resume:hover { --pico-background-color: #15803d; --pico-border-color: #15803d; }

  /* Tabs */
  [role=tablist] { margin-bottom: .5rem; border-bottom: 1px solid var(--pico-muted-border-color); }
  [role=tab] { cursor: pointer; text-decoration: none; }
  [role=tab][aria-selected=true] { color: var(--pico-primary); border-bottom: 2px solid var(--pico-primary); margin-bottom: -1px; }
  [role=tab]:not([aria-selected=true]):hover { color: var(--pico-color); }

  /* Progress bar */
  .prog { width: 100%; height: 20px; background: var(--pico-muted-border-color); border-radius: 4px; overflow: hidden; position: relative; }
  .prog-bar { height: 100%; border-radius: 4px; transition: width .3s ease; }
  .prog-bar.low { background: #dc2626; }
  .prog-bar.mid { background: var(--pico-primary); }
  .prog-bar.done { background: #16a34a; }
  .prog-txt { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #fff; mix-blend-mode: difference; }

  td, th { font-size: .85rem; }
  .empty { text-align: center; color: var(--pico-muted-color); padding: 2rem 0; }
  .panel { display: none; }
  .panel.active { display: block; }
</style>
</head>
<body>
<header>
  <nav>
    <ul><li><strong>Telegram Media Downloader</strong><span class="ver" id="ver">v-</span></li></ul>
    <ul><li><button class="btn-{{ 'resume' if download_state == 'continue' else 'pause' }}" id="stateBtn" data-state="{{ download_state }}">{{ download_state }}</button></li></ul>
  </nav>
  <nav role="tablist">
    <ul>
      <li><a role="tab" href="#" data-panel="downloading" aria-selected="true">Downloading</a></li>
      <li><a role="tab" href="#" data-panel="downloaded" aria-selected="false">Downloaded</a></li>
    </ul>
  </nav>
</header>

<main class="container-fluid">
  <div class="panel active" id="downloading">
    <table class="striped">
      <thead><tr><th style="width:120px">Chat</th><th style="width:80px">ID</th><th>File Name</th><th style="width:100px">Size</th><th style="width:200px">Progress</th><th style="width:110px">Speed</th></tr></thead>
      <tbody id="dlBody"><tr><td colspan="6" class="empty">No active downloads</td></tr></tbody>
    </table>
  </div>
  <div class="panel" id="downloaded">
    <table class="striped">
      <thead><tr><th style="width:80px">ID</th><th>File Name</th><th style="width:100px">Size</th><th>Save Path</th></tr></thead>
      <tbody id="doneBody"><tr><td colspan="4" class="empty">No completed downloads</td></tr></tbody>
    </table>
  </div>
</main>

<footer>
  <div>
    <span>Telegram Media Downloader</span>
    <span class="speed" id="dlSpeed">0.00 B/s</span>
  </div>
</footer>

<script>
var dlData = {};
function $id(s) { return document.getElementById(s); }
function ajax(url, cb) { var x = new XMLHttpRequest(); x.open('GET', url, true); x.onload = function() { try { cb(x.responseText); } catch(e) {} }; x.send(); }

ajax('get_app_version', function(v) { $id('ver').textContent = 'v' + v; });

$id('stateBtn').onclick = function() {
  var self = this, s = self.dataset.state, x = new XMLHttpRequest();
  x.open('POST', 'set_download_state?state=' + s, false);
  x.send();
  var ns = x.responseText; self.textContent = ns; self.dataset.state = ns;
  self.className = 'btn-' + (ns === 'continue' ? 'resume' : 'pause');
};

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function progBar(pct) {
  var cls = pct <= 30 ? 'low' : pct < 100 ? 'mid' : 'done';
  return '<td><div class="prog"><div class="prog-bar ' + cls + '" style="width:' + pct + '%"></div><div class="prog-txt">' + pct + '%</div></div></td>';
}

function refreshDownloading() {
  ajax('get_download_list?already_down=false', function(raw) {
    var list = JSON.parse(raw), seen = {}, html = '';
    for (var i = 0; i < list.length; i++) {
      var d = list[i], key = d.chat + '|' + d.id;
      seen[key] = true; dlData[key] = d;
      html += '<tr><td>' + esc(d.chat) + '</td><td>' + d.id + '</td><td>' + esc(d.filename) + '</td><td>' + esc(d.total_size) + '</td>' + progBar(d.download_progress) + '<td>' + esc(d.download_speed) + '</td></tr>';
    }
    for (var k in dlData) { if (!seen[k] && dlData[k].download_progress >= 100) delete dlData[k]; }
    $id('dlBody').innerHTML = html || '<tr><td colspan="6" class="empty">No active downloads</td></tr>';
  });
}

function refreshDone() {
  ajax('get_download_list?already_down=true', function(raw) {
    var list = JSON.parse(raw), html = '';
    for (var i = 0; i < list.length; i++) {
      var d = list[i];
      html += '<tr><td>' + d.id + '</td><td>' + esc(d.filename) + '</td><td>' + esc(d.total_size) + '</td><td>' + esc(d.save_path) + '</td></tr>';
    }
    $id('doneBody').innerHTML = html || '<tr><td colspan="4" class="empty">No completed downloads</td></tr>';
  });
}

function refreshSpeed() {
  ajax('get_download_status', function(raw) { $id('dlSpeed').textContent = JSON.parse(raw).download_speed; });
}

// Tab switching
var activePanel = 'downloading', intervals = {};
document.querySelectorAll('[role=tab]').forEach(function(t) {
  t.onclick = function(e) {
    e.preventDefault();
    document.querySelectorAll('[role=tab]').forEach(function(x) { x.setAttribute('aria-selected', 'false'); });
    document.querySelectorAll('.panel').forEach(function(x) { x.classList.remove('active'); });
    t.setAttribute('aria-selected', 'true');
    var p = t.dataset.panel; $id(p).classList.add('active');
    if (p !== activePanel) {
      if (activePanel === 'downloading') clearInterval(intervals.dl);
      else clearInterval(intervals.done);
      activePanel = p;
      if (p === 'downloading') { refreshDownloading(); intervals.dl = setInterval(refreshDownloading, 1000); }
      else { refreshDone(); intervals.done = setInterval(refreshDone, 1000); }
    }
  };
});

intervals.dl = setInterval(refreshDownloading, 1000);
intervals.speed = setInterval(refreshSpeed, 1000);
refreshDownloading(); refreshSpeed();
</script>
</body>
</html>
